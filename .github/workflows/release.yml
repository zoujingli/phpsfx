name: Release swoole-cli

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example v0.1.0'
        required: true
        default: 'v0.1.0'
        type: string
      php_version:
        description: 'PHP version line'
        required: true
        default: '8.4'
        type: string
      swoole_cli_ref:
        description: 'swoole-cli branch, tag, or commit'
        required: true
        default: 'v6.2.0.0'
        type: string
      prepare_flags:
        description: 'Optional prepare.php flags. Leave empty to use repository defaults.'
        required: false
        default: ''
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}-${{ github.event.inputs.version || github.ref_name }}
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PHPSFX_PROFILE_FILE: scripts/profiles/hyperfadmin-slim.env

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
          - platform: linux-a64
            runner: ubuntu-24.04-arm
          - platform: macos-x64
            runner: macos-15-intel
          - platform: macos-a64
            runner: macos-15

    env:
      PHPSFX_PLATFORM: ${{ matrix.platform }}
      PHPSFX_PHP_VERSION: ${{ github.event.inputs.php_version || '8.4' }}
      PHPSFX_SWOOLE_CLI_REF: ${{ github.event.inputs.swoole_cli_ref || 'v6.2.0.0' }}
      PHPSFX_DIST_DIR: ${{ github.workspace }}/dist/${{ matrix.platform }}
      PHPSFX_BUILD_JOBS: 2

    steps:
      - name: Checkout phpsfx
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake autopoint bison bzip2 ca-certificates clang clang-tools cmake coreutils curl diffutils \
            flex g++ gcc gettext git libtool libtool-bin lld locales lzip make meson musl-tools nasm netcat-openbsd \
            ninja-build p7zip-full pkg-config python3 python3-pip re2c tar unzip wget xz-utils yasm zip

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: |
          set -eux
          brew update
          brew install autoconf automake bison cmake coreutils flex gettext libtool meson nasm ninja pkg-config re2c xz yasm || true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ github.event.inputs.php_version || '8.4' }}
          tools: composer:v2
          coverage: none
          extensions: curl, openssl, mbstring, phar, zip
          ini-values: memory_limit=-1, phar.readonly=0

      - name: Show environment
        run: |
          set -eux
          uname -a
          php -v
          composer --version
          git --version
          make --version | head -1

      - name: Build and validate swoole-cli
        env:
          PHPSFX_SWOOLE_CLI_PREPARE_FLAGS: ${{ github.event.inputs.prepare_flags }}
        run: |
          set -euo pipefail
          if [ -z "${PHPSFX_SWOOLE_CLI_PREPARE_FLAGS:-}" ]; then
            unset PHPSFX_SWOOLE_CLI_PREPARE_FLAGS
          fi
          set +e
          bash scripts/build-swoole-cli.sh "${PHPSFX_PLATFORM}" 2>&1 | tee "build-${PHPSFX_PLATFORM}.log"
          status=${PIPESTATUS[0]}
          set -e
          if [ "${status}" -ne 0 ]; then
            grep -Ein 'fatal error|[^A-Za-z]error:|failed|killed|No such|make(\\[[0-9]+\\])?: \\*\\*\\*' "build-${PHPSFX_PLATFORM}.log" | tail -80 > "build-${PHPSFX_PLATFORM}-summary.log" || true
            if [ ! -s "build-${PHPSFX_PLATFORM}-summary.log" ]; then
              tail -120 "build-${PHPSFX_PLATFORM}.log" > "build-${PHPSFX_PLATFORM}-summary.log"
            fi
            tail_text=$(cat "build-${PHPSFX_PLATFORM}-summary.log" | tr '\n' '|' | sed -e 's/%/%25/g')
            echo "::error title=Build failed ${PHPSFX_PLATFORM}::${tail_text}"
            exit "${status}"
          fi

      - name: Test PHP and Phar SFX packaging
        run: |
          bash scripts/test-packaging.sh "dist/${PHPSFX_PLATFORM}/swoole-cli-php${PHPSFX_PHP_VERSION}-${PHPSFX_PLATFORM}"

      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.platform }}
          retention-days: 7
          if-no-files-found: ignore
          path: |
            build-${{ matrix.platform }}.log
            build-${{ matrix.platform }}-summary.log

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: swoole-cli-${{ matrix.platform }}
          retention-days: 30
          if-no-files-found: error
          path: |
            dist/${{ matrix.platform }}/swoole-cli-php${{ env.PHPSFX_PHP_VERSION }}-${{ matrix.platform }}
            dist/${{ matrix.platform }}/build-meta-${{ matrix.platform }}.json

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    env:
      PHPSFX_RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
      PHPSFX_PHP_VERSION: ${{ github.event.inputs.php_version || '8.4' }}
      PHPSFX_SWOOLE_CLI_REF: ${{ github.event.inputs.swoole_cli_ref || 'v6.2.0.0' }}
      PHPSFX_SWOOLE_CLI_PREPARE_FLAGS: ${{ github.event.inputs.prepare_flags }}
    steps:
      - name: Checkout phpsfx
        uses: actions/checkout@v4

      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: swoole-cli-*
          path: dist
          merge-multiple: true

      - name: Generate release metadata
        run: |
          set -eux
          find dist -maxdepth 1 -type f -print | sort
          python3 scripts/merge-build-meta.py dist dist/build-meta.json
          cd dist
          sha256sum swoole-cli-php${PHPSFX_PHP_VERSION}-* > SHA256SUMS
          cat SHA256SUMS
          test -s build-meta.json

      - name: Upload combined workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: swoole-cli-release-${{ env.PHPSFX_RELEASE_VERSION }}
          retention-days: 90
          if-no-files-found: error
          path: |
            dist/swoole-cli-php${{ env.PHPSFX_PHP_VERSION }}-*
            dist/SHA256SUMS
            dist/build-meta.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.PHPSFX_RELEASE_VERSION }}
          name: phpsfx ${{ env.PHPSFX_RELEASE_VERSION }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
          body: |
            Swoole CLI PHP ${{ env.PHPSFX_PHP_VERSION }} runtime for HyperfAdmin.

            This release uses the `hyperfadmin-slim` profile and Swoole CLI SFX format:

            `swoole-cli + payload.php|app.phar + pack('J', payloadSize)`

            Run packed applications with `--self`, for example `./app --self list`.
          files: |
            dist/swoole-cli-php${{ env.PHPSFX_PHP_VERSION }}-*
            dist/SHA256SUMS
            dist/build-meta.json
