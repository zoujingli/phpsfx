name: Release micro.sfx

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example v0.1.0'
        required: true
        default: 'v0.1.0'
        type: string
      php_version:
        description: 'PHP version line'
        required: true
        default: '8.4'
        type: string
      spc_ref:
        description: 'static-php-cli branch, tag, or commit'
        required: true
        default: 'main'
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}-${{ github.event.inputs.version || github.ref_name }}
  cancel-in-progress: false

env:
  PHPSFX_EXTENSIONS: bcmath,ctype,curl,dom,fileinfo,filter,iconv,mbstring,openssl,pcntl,pdo_mysql,phar,posix,redis,simplexml,sockets,sodium,swoole,tokenizer,xml,xmlreader,xmlwriter,zlib
  PHPSFX_REQUIRED_EXTENSIONS: swoole,redis,pdo_mysql,openssl,curl,mbstring,phar,zlib

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
          - platform: linux-a64
            runner: ubuntu-24.04-arm
          - platform: macos-x64
            runner: macos-15-intel
          - platform: macos-a64
            runner: macos-15

    env:
      PHPSFX_PLATFORM: ${{ matrix.platform }}
      PHPSFX_PHP_VERSION: ${{ github.event.inputs.php_version || '8.4' }}
      PHPSFX_SPC_REF: ${{ github.event.inputs.spc_ref || 'main' }}
      PHPSFX_DIST_DIR: ${{ github.workspace }}/dist/${{ matrix.platform }}

    steps:
      - name: Checkout phpsfx
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ github.event.inputs.php_version || '8.4' }}
          tools: composer:v2
          coverage: none
          extensions: curl, openssl, mbstring
          ini-values: memory_limit=-1

      - name: Show environment
        run: |
          set -eux
          uname -a
          php -v
          composer --version
          if command -v docker >/dev/null 2>&1; then docker version; fi

      - name: Build and validate micro.sfx
        run: |
          set +e
          bash scripts/build-micro-sfx.sh "${PHPSFX_PLATFORM}" 2>&1 | tee "build-${PHPSFX_PLATFORM}.log"
          status=${PIPESTATUS[0]}
          set -e
          if [ "${status}" -ne 0 ]; then
            tail_text=$(tail -120 "build-${PHPSFX_PLATFORM}.log" | tr '\n' '|' | sed -e 's/%/%25/g')
            echo "::error title=Build failed ${PHPSFX_PLATFORM}::${tail_text}"
            exit "${status}"
          fi

      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.platform }}
          retention-days: 7
          if-no-files-found: ignore
          path: build-${{ matrix.platform }}.log

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: micro-sfx-${{ matrix.platform }}
          retention-days: 30
          if-no-files-found: error
          path: |
            dist/${{ matrix.platform }}/micro.sfx-php${{ env.PHPSFX_PHP_VERSION }}-${{ matrix.platform }}
            dist/${{ matrix.platform }}/build-meta-${{ matrix.platform }}.json

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    env:
      PHPSFX_RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
      PHPSFX_PHP_VERSION: ${{ github.event.inputs.php_version || '8.4' }}
      PHPSFX_SPC_REF: ${{ github.event.inputs.spc_ref || 'main' }}
    steps:
      - name: Checkout phpsfx
        uses: actions/checkout@v4

      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: micro-sfx-*
          path: dist
          merge-multiple: true

      - name: Generate release metadata
        run: |
          set -eux
          find dist -maxdepth 1 -type f -print | sort
          python3 scripts/merge-build-meta.py dist dist/build-meta.json
          cd dist
          sha256sum micro.sfx-php${PHPSFX_PHP_VERSION}-* > SHA256SUMS
          cat SHA256SUMS
          test -s build-meta.json

      - name: Upload combined workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: micro-sfx-release-${{ env.PHPSFX_RELEASE_VERSION }}
          retention-days: 90
          if-no-files-found: error
          path: |
            dist/micro.sfx-php${{ env.PHPSFX_PHP_VERSION }}-*
            dist/SHA256SUMS
            dist/build-meta.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.PHPSFX_RELEASE_VERSION }}
          name: phpsfx ${{ env.PHPSFX_RELEASE_VERSION }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
          files: |
            dist/micro.sfx-php${{ env.PHPSFX_PHP_VERSION }}-*
            dist/SHA256SUMS
            dist/build-meta.json
